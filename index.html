<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Open</title>
    <link rel="stylesheet" href="styles.css">
    <script defer src="script.js"></script>
  </head>
  <body>
    <main class="screen">
      <video
        class="player player--active"
        data-startup-player
        autoplay
        playsinline
        preload="auto"
        disablepictureinpicture
        disableremoteplayback
        x-webkit-airplay="deny"
      >
        <source src="assets/startup-alt.mp4" type="video/mp4">
      </video>
      <video
        class="player player--hidden"
        data-continuation-player
        playsinline
        preload="auto"
        disablepictureinpicture
        disableremoteplayback
        x-webkit-airplay="deny"
      >
        <source src="assets/continuation.mp4" type="video/mp4">
      </video>

      <div class="gate" data-gate hidden>
        <div class="gate__panel">
          <span class="gate__eyebrow">Unlock Clip</span>
          <div class="unlock" data-unlock>
            <div class="unlock__slot">
              <div class="unlock__glow"></div>
              <button class="unlock__pin" data-unlock-pin type="button" aria-label="Slide up to unlock">
                <span class="unlock__pin-rib"></span>
              </button>
            </div>
          </div>
          <span class="gate__label" data-gate-label>Slide up to unlock</span>
        </div>
      </div>

      <p class="sr-only" aria-live="polite" data-status></p>
    </main>
  </body>
</html>
